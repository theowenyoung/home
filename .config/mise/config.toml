[tools]
deno = "latest"
node = "lts"
ruby = "latest"
bun = "latest"
zig = "latest"
redis = "latest"
uv = "latest"
python = "3.14"
rust = "1.91.1"
"pipx:ansible" = "13"
zola = "0.21"
hugo = "0.160"
awscli = { version = "2.22.35", symlink_bins = "true" }
go = "latest"
neovim = "latest"

[settings]
trusted_config_paths = ["~/project/jant", "~/project"]

[tasks.skills-restore]
description = "Reinstall global npx skills from ~/.agents/.skill-lock.json"
run = '''
jq -r '.skills | to_entries[] | "\(.value.source) -s \(.key)"' ~/.agents/.skill-lock.json \
  | while read -r args; do npx skills add $args -g -y; done
'''
